# GitHub Actions CI for StructPINN.
#
# This file is parked here instead of .github/workflows/ because the push token
# currently lacks the GitHub OAuth "workflow" scope, so commits under
# .github/workflows/ are rejected. To activate CI:
#   1. grant the scope (e.g. `gh auth refresh -h github.com -s workflow`, or
#      use a PAT that includes the `workflow` scope), then
#   2. move this file to .github/workflows/CI.yml and push.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
